<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة مراقبة الطلبات العامة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #111827; color: #f9fafb; padding-bottom: 40px; }
        .dashboard-header { background: linear-gradient(135deg, #1e3a8a 0%, #0f172a 100%); border-bottom: 2px solid #374151; padding: 15px; }
        .dash-card { background-color: #1f2937; border: 1px solid #374151; border-radius: 14px; padding: 15px; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(0.99); } }
        .status-waiter-pulse { border: 2px solid #f59e0b !important; animation: pulse 1s infinite; }
        .status-bill-pulse { border: 2px solid #ef4444 !important; animation: pulse 1s infinite; }
        .dash-item-row { background: rgba(255,255,255,0.02); border-radius: 8px; padding: 6px 12px; margin-bottom: 6px; }
    </style>
</head>
<body>

<div class="dashboard-header text-center shadow">
    <h4 class="fw-bold mb-1 text-white">📊 لوحة المراقبة والمتابعة العامة</h4>
</div>

<div class="container-fluid px-3 mt-4">
    <div id="dashboard-grid" class="row g-3">
        <div class="col-12 text-center py-5 text-muted">جاري تحميل البيانات الحية...</div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC6fFl4gN2N-W7oK3v70g_v3P932fM6bNY",
        authDomain: "almenu-system.firebaseapp.com",
        databaseURL: "https://almenu-system-default-rtdb.firebaseio.com",
        projectId: "almenu-system",
        storageBucket: "almenu-system.appspot.com",
        messagingSenderId: "305206060548",
        appId: "1:305206060548:web:b1d79aa3ec2c2cc2ebbb9d"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    database.ref('orders_system').on('value', (snapshot) => {
        const container = document.getElementById('dashboard-grid');
        const data = snapshot.val();
        if (!data) { container.innerHTML = `<div class="col-12 text-center py-5 text-white-50">✨ لا توجد طاولات نشطة.</div>`; return; }
        container.innerHTML = '';

        for (const key in data) {
            const order = data[key];
            let cardClass = "dash-card";
            let badge = `<span class="badge bg-success">⚙️ تحت الخدمة</span>`;

            if (order.waiter_requested) { cardClass += " status-waiter-pulse"; badge = `<span class="badge bg-warning text-dark">🔔 نداء ويتر</span>`; }
            else if (order.bill_requested) { cardClass += " status-bill-pulse"; badge = `<span class="badge bg-danger">🧾 طلب حساب</span>`; }

            let itemsHtml = Object.values(order.items || {}).map(i => `
                <div class="d-flex justify-content-between dash-item-row">
                    <span class="text-white-50">${i.name}</span><span class="badge bg-primary">x${i.quantity}</span>
                </div>
            `).join('');

            const col = document.createElement('div');
            col.className = "col-12 col-md-6 col-lg-4";
            col.innerHTML = `
                <div class="${cardClass}">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2 border-secondary">
                        <h5 class="fw-bold mb-0 text-warning">طاولة # ${key}</h5>${badge}
                    </div>
                    <div class="mb-3">${itemsHtml || '<div class="text-muted small">نداء مباشر</div>'}</div>
                    <div class="p-2 rounded bg-dark d-flex justify-content-between align-items-center">
                        <span class="small text-muted">الإجمالي:</span><span class="fw-bold text-success">${Number(order.total_price || 0).toLocaleString()} د.ع</span>
                    </div>
                    <div class="row g-2 mt-2">
                        <div class="col-6"><button class="btn btn-sm btn-outline-warning w-100" onclick="updateStatus('${key}', 'waiter')">تلبية الويتر</button></div>
                        <div class="col-6"><button class="btn btn-sm btn-outline-danger w-100" onclick="updateStatus('${key}', 'bill')">تثبيط الحساب</button></div>
                    </div>
                </div>
            `;
            container.appendChild(col);
        }
    });

    function updateStatus(key, type) {
        let updateData = {};
        if (type === 'waiter') updateData.waiter_requested = false;
        if (type === 'bill') updateData.bill_requested = false;
        database.ref(`orders_system/${key}`).update(updateData);
    }
</script>
</body>
</html>
