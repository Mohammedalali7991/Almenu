<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>شاشة الكاشير والطلبات الحية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #1e272e; color: #f5f6fa; padding-bottom: 30px; }
        .cashier-header { background-color: #273c75; border-bottom: 3px solid #192a56; padding: 15px; border-radius: 0 0 16px 16px; }
        .live-card { background-color: #2f3640; border: 1px solid #718093; border-radius: 14px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); transition: all 0.3s; }
        @keyframes blinker { 50% { opacity: 0.5; border-color: #ffdd59; } }
        .blinker-active { animation: blinker 1.5s linear infinite; background-color: #3d4654; }
        .item-row { background: rgba(255,255,255,0.05); border-radius: 8px; padding: 6px 10px; margin-bottom: 6px; font-size: 0.95rem; }
        #printArea { display: none; }
        @media print {
            body * { visibility: hidden; background: white !important; color: black !important; }
            #printArea, #printArea * { visibility: visible; }
            #printArea { display: block !important; position: absolute; left: 0; top: 0; width: 100%; padding: 10px; direction: rtl; font-family: monospace; }
            .print-header { text-align: center; border-bottom: 1px dashed #000; padding-bottom: 10px; }
            .print-item { display: flex; justify-content: space-between; font-size: 14px; margin-top: 5px; }
        }
    </style>
</head>
<body>

<div class="cashier-header text-center shadow">
    <h4 class="fw-bold mb-1">🖥️ شاشة إدارة المبيعات والطلبات الفورية</h4>
    <p class="text-white-50 small mb-0">مطعم دجلة - تحديث بث حي تلقائي</p>
</div>

<div class="container-fluid px-3 mt-4">
    <div id="live-grid" class="row g-3">
        <div class="col-12 text-center py-5 text-muted">جاري الاتصال بقاعدة البيانات...</div>
    </div>
</div>

<div id="printArea"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC6fFl4gN2N-W7oK3v70g_v3P932fM6bNY",
        authDomain: "almenu-system.firebaseapp.com",
        databaseURL: "https://almenu-system-default-rtdb.firebaseio.com",
        projectId: "almenu-system",
        storageBucket: "almenu-system.appspot.com",
        messagingSenderId: "305206060548",
        appId: "1:305206060548:web:b1d79aa3ec2c2cc2ebbb9d"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    database.ref('orders_system').on('value', (snapshot) => {
        const container = document.getElementById('live-grid');
        const data = snapshot.val();
        if (!data) { container.innerHTML = `<div class="col-12 text-center py-5 text-white-50">✨ لا يوجد طلبات نشطة حالياً.</div>`; return; }
        container.innerHTML = '';

        for (const key in data) {
            const order = data[key];
            let isOnlyService = !order.items; // التحقق هل هو نداء نادل فقط بدون وجبات
            let cardClass = "live-card";
            let statusBadge = `<span class="badge bg-success">⏳ قيد التحضير</span>`;
            let footerHtml = "";

            if (order.waiter_requested) { 
                cardClass += " blinker-active"; 
                statusBadge = `<span class="badge bg-warning text-dark">🔔 نداء الويتر</span>`; 
            } else if (order.bill_requested) { 
                cardClass += " blinker-active"; 
                statusBadge = `<span class="badge bg-danger">🧾 طلب الحساب</span>`; 
            }

            // بناء المحتوى السفلي بناءً على نوع الطلب لمنع تداخل أزرار الطباعة والمبالغ الصفرية
            if (isOnlyService) {
                footerHtml = `
                    <div class="alert alert-warning text-center py-2 mb-2 small text-dark fw-bold">
                         ${order.waiter_requested ? "🛑 نداء خدمة مباشر بدون طلب طعام" : "💰 طلب الحساب المباشر"}
                    </div>
                    <div class="col-12">
                        <button class="btn btn-warning w-100 text-dark fw-bold py-2 shadow-sm" onclick="respondToWaiter('${key}')">
                            🤝 تلبية النداء (النادل في طريقه إليك)
                        </button>
                    </div>
                    <div class="col-12 mt-2">
                        <button class="btn btn-sm btn-outline-secondary w-100" onclick="clearTable('${key}')">إغلاق وتصفير</button>
                    </div>
                `;
            } else {
                let itemsHtml = Object.values(order.items).map(item => `
                    <div class="d-flex justify-content-between item-row">
                        <span>${item.name}</span><span class="badge bg-light text-dark">x${item.quantity}</span>
                    </div>
                `).join('');

                footerHtml = `
                    <div class="mb-3">${itemsHtml}</div>
                    <div class="d-flex justify-content-between align-items-center mb-2 px-1">
                        <span class="small text-white-50">إجمالي الحساب:</span>
                        <span class="fs-5 fw-bold text-success">${Number(order.total_price || 0).toLocaleString()} د.ع</span>
                    </div>
                    <div class="row g-2 mt-2 border-top pt-2 border-secondary">
                        ${order.waiter_requested ? `<div class="col-12 mb-1"><button class="btn btn-sm btn-warning w-100 text-dark fw-bold" onclick="updateStatus('${key}', 'waiter')">تلبية نداء الويتر المدمج</button></div>` : ''}
                        <div class="col-6"><button class="btn btn-sm btn-primary w-100 fw-bold py-2" onclick="printInvoice('${key}')">🖨️ طباعة الفاتورة</button></div>
                        <div class="col-6"><button class="btn btn-sm btn-danger w-100 fw-bold py-2" onclick="clearTable('${key}')">🧹 إنهاء وتصفير</button></div>
                    </div>
                `;
            }

            const col = document.createElement('div');
            col.className = "col-12 col-md-6 col-lg-4";
            col.innerHTML = `
                <div class="${cardClass}">
                    <div class="d-flex justify-content-between align-items-center mb-3 border-bottom pb-2 border-secondary">
                        <h5 class="fw-bold mb-0 text-info">طاولة # ${key}</h5>${statusBadge}
                    </div>
                    <div class="row g-2">${footerHtml}</div>
                </div>
            `;
            container.appendChild(col);
        }
    });

    function respondToWaiter(key) {
        database.ref(`orders_system/${key}`).update({
            waiter_status_message: "النادل في طريقه إليك الآن 🏃‍♂️",
            waiter_requested: false
        }).then(() => { alert(`تم إرسال إشعار لطاولة ${key}`); });
    }

    function updateStatus(key, type) {
        let updateData = {};
        if (type === 'waiter') updateData.waiter_requested = false;
        database.ref(`orders_system/${key}`).update(updateData);
    }

    function printInvoice(key) {
        database.ref(`orders_system/${key}`).once('value', (snapshot) => {
            const order = snapshot.val();
            if (!order || !order.items) return;
            let lines = Object.values(order.items).map(i => `
                <div class="print-item"><span>${i.name} (x${i.quantity})</span><span>${(i.price * i.quantity).toLocaleString()} د.ع</span></div>
            `).join('');

            document.getElementById('printArea').innerHTML = `
                <div class="print-header"><h4>🌟 مطعم دجلة 🌟</h4><h5>طاولة رقم: ${key}</h5></div>
                <div>${lines}</div><hr>
                <div class="d-flex justify-content-between fw-bold"><span>المجموع:</span><span>${Number(order.total_price || 0).toLocaleString()} د.ع</span></div>
            `;
            window.print();
        });
    }

    function clearTable(key) { if (confirm(`تصفير طاولة رقم ${key}؟`)) database.ref(`orders_system/${key}`).remove(); }
</script>
</body>
</html>
