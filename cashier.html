<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة الكاشير والمطبخ المركزية</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f0f0f; color: #e0e0e0; padding: 15px; }
        header { text-align: center; padding: 15px; background: #1a1a1a; border-radius: 12px; border: 1px solid #d4af37; margin-bottom: 20px; }
        h1 { color: #d4af37; font-size: 20px; }
        
        .live-container { display: flex; flex-direction: column; gap: 15px; }
        .table-card { background: #161616; border: 1px solid #2d2d2d; border-radius: 12px; padding: 15px; position: relative; }
        
        /* وميض ذكي ملون عند نداء النادل أو طلب الفاتورة لتنبيه الكاشير فوراً */
        .table-card.alert-waiter { border-color: #e67e22; background: #1f1912; animation: blink 1.5s infinite; }
        .table-card.alert-bill { border-color: #2980b9; background: #121921; animation: blink 1.5s infinite; }
        
        @keyframes blink {
            0% { border-width: 1px; }
            50% { border-color: #ff9f43; box-shadow: 0 0 10px rgba(230,126,34,0.4); }
            100% { border-width: 1px; }
        }

        .table-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .badge { background: #d4af37; color: #000; padding: 3px 10px; border-radius: 6px; font-weight: bold; font-size: 14px; }
        .status { background: #333; color: #fff; padding: 3px 8px; border-radius: 5px; font-size: 12px; }
        
        .item-line { font-size: 14px; margin-bottom: 5px; padding-right: 8px; border-right: 2px solid #d4af37; }
        .notice-text { font-size: 14px; font-weight: bold; margin-bottom: 10px; padding: 5px; border-radius: 4px; }
        
        .btn-group { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
        .btn { flex: 1; min-width: 80px; border: none; padding: 8px; border-radius: 6px; font-weight: bold; cursor: pointer; font-size: 12px; text-align: center; }
        .btn-cook { background: #2980b9; color: white; }
        .btn-ready { background: #27ae60; color: white; }
        .btn-clear { background: #c0392b; color: white; }
    </style>
</head>
<body>

    <header>
        <h1>🖥️ لوحة تحكم الكاشير والمطبخ المركزية 👨‍🍳</h1>
        <p style="font-size: 11px; color: #888; margin-top: 4px;">مزامنة فورية حية لطلبات ونداءات الطاولات</p>
    </header>

    <div class="live-container" id="liveContainer">
        <p style="text-align:center; color:#666; padding: 20px;">في انتظار طلبات أو نداءات حية من الزبائن...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        // إعدادات قاعدة بيانات مشروعك
        const firebaseConfig = {
            apiKey: "AIzaSyCEk80-ag9mv5JP9LRBZTq1_qiVKcwUQKQ",
            authDomain: "almenu-system.firebaseapp.com",
            databaseURL: "https://almenu-system-default-rtdb.firebaseio.com",
            projectId: "almenu-system",
            storageBucket: "almenu-system.firebasestorage.app",
            messagingSenderId: "259548428040",
            appId: "1:259548428040:web:8d156f73ed55cec3cadebd"
        };

        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        // الاستماع الفوري للمسار الموحد للبيانات (orders_system)
        database.ref('orders_system').on('value', (snapshot) => {
            const container = document.getElementById('liveContainer');
            container.innerHTML = '';
            const data = snapshot.val();

            if (!data) {
                container.innerHTML = '<p style="text-align:center; color:#666; padding: 20px;">في انتظار طلبات أو نداءات حية من الزبائن...</p>';
                return;
            }

            for (const key in data) {
                const order = data[key];
                
                let cardClass = 'table-card';
                let alertText = '';
                
                // تشغيل التنبيهات الملونة للوحة الموحدة حسب ضغطة الزبون
                if (order.waiter_requested) {
                    cardClass += ' alert-waiter';
                    alertText = '🛎️ الزبون ينادي النادل (الويتر) فورا!';
                } else if (order.bill_requested) {
                    cardClass += ' alert-bill';
                    alertText = '🧾 الزبون يطلب الفاتورة والحساب النهائي!';
                }

                let itemsHtml = '';
                if (order.items && order.items.length > 0) {
                    order.items.forEach(item => {
                        itemsHtml += `<div class="item-line">${item.name} × العدد: ${item.quantity}</div>`;
                    });
                } else {
                    itemsHtml = '<span style="color:#666; font-size:13px;">(تنبيه خدمات فقط - لا توجد أطباق في السلة حالياً)</span>';
                }

                const card = document.createElement('div');
                card.className = cardClass;
                card.innerHTML = `
                    <div class="table-header">
                        <span class="badge">طاولة ${order.table || key.replace('table_', '')}</span>
                        <span class="status">${order.status || 'طلب جديد'}</span>
                    </div>
                    
                    ${alertText ? `<div class="notice-text" style="color: ${order.waiter_requested ? '#e67e22' : '#2980b9'}">${alertText}</div>` : ''}
                    
                    <div style="margin: 10px 0;">${itemsHtml}</div>
                    
                    <div style="font-weight:bold; color:#d4af37; margin-top:5px; font-size:15px;">
                        إجمالي الحساب: ${order.acc_total ? order.acc_total.toLocaleString() : 0} د.ع
                    </div>
                    
                    <div class="btn-group">
                        <button class="btn btn-cook" onclick="updateTableStatus('${key}', 'قيد التحضير في المطبخ 👨‍🍳')">👨‍🍳 تحضير</button>
                        <button class="btn btn-ready" onclick="updateTableStatus('${key}', 'جاهز للتوصيل 🚀')">🚀 جاهز</button>
                        <button class="btn btn-clear" onclick="clearTableFinal('${key}')">🧹 محاسبة وتصفير</button>
                    </div>
                `;
                container.appendChild(card);
            }
        });

        // تحديث الحالة ومسح إشارات النداء بمجرد استجابة الطاقم
        function updateTableStatus(key, newStatus) {
            database.ref(`orders_system/${key}`).update({
                status: newStatus,
                waiter_requested: false,
                bill_requested: false
            });
        }

        // تصفير ومسح الطاولة نهائياً بعد مغادرة الزبون
        function clearTableFinal(key) {
            if (confirm("هل أنت متأكد من استلام المبلغ وتصفير الطاولة للزبون التالي؟")) {
                database.ref(`orders_system/${key}`).remove();
            }
        }
    </script>
</body>
</html>
