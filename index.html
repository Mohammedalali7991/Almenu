<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة الطعام الرسمية</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root { --bg-dark: #111216; --card-bg: #1a1b22; --accent-gold: #c5a880; --text-main: #f3f4f6; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--bg-dark); color: var(--text-main); padding-bottom: 150px; }
        .app-header { background: var(--card-bg); padding: 25px 15px; text-align: center; border-bottom: 2px solid var(--accent-gold); border-radius: 0 0 20px 20px; position: relative; }
        .category-badge-scroller { overflow-x: auto; white-space: nowrap; padding: 12px 0; scrollbar-width: none; }
        .category-badge-scroller::-webkit-scrollbar { display: none; }
        .cat-item-btn { border-radius: 20px; padding: 6px 18px; font-size: 0.9rem; font-weight: 600; background: var(--card-bg); color: var(--text-main); border: 1px solid rgba(197,168,128,0.15); margin-left: 6px; transition: all 0.2s; }
        .cat-item-btn.active { background: var(--accent-gold); color: #111216; border-color: var(--accent-gold); }
        .dish-card { background: var(--card-bg); border-radius: 14px; border: 1px solid rgba(255,255,255,0.02); transition: transform 0.2s; position: relative; }
        .dish-disabled { opacity: 0.35; pointer-events: none; }
        .badge-out { position: absolute; top: 10px; left: 10px; background: #dc3545; color: white; padding: 2px 8px; font-size: 0.75rem; border-radius: 6px; font-weight: bold; }
        .dish-img { width: 75px; height: 75px; object-fit: cover; border-radius: 10px; border: 1px solid var(--accent-gold); }
        .counter-btn { width: 28px; height: 28px; border-radius: 50%; border: none; background: var(--accent-gold); color: #111216; font-weight: bold; }
        .action-dock-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card-bg); padding: 15px; border-top: 2px solid var(--accent-gold); border-radius: 166px 16px 0 0; z-index: 1040; }
        .toast-popup-banner { position: fixed; top: 25px; left: 50%; transform: translateX(-50%); background: #198754; color: white; padding: 12px 24px; border-radius: 50px; z-index: 2050; font-weight: bold; box-shadow: 0 4px 15px rgba(0,0,0,0.5); display: none; }
    </style>
</head>
<body>

<div id="toast-waiter-alert" class="toast-popup-banner">🏃‍♂️ الويتر في طريقه إليك الآن!</div>

<div class="app-header">
    <div class="position-absolute top-0 start-0 m-3">
        <div class="btn-group shadow-sm">
            <button class="btn btn-sm btn-dark text-white border-secondary px-2 py-1" onclick="changeLanguage('AR')">عربي</button>
            <button class="btn btn-sm btn-dark text-white border-secondary px-2 py-1" onclick="changeLanguage('EN')">EN</button>
            <button class="btn btn-sm btn-dark text-white border-secondary px-2 py-1" onclick="changeLanguage('KU')">كردي</button>
        </div>
    </div>
    <h4 class="fw-bold mb-1" id="ui-restaurant-name" style="color: var(--accent-gold);">مطعم دجلة</h4>
    <p class="small text-muted mb-0" id="ui-restaurant-sub">أطباق ومأكولات طازجة محضرة بأعلى معايير الجودة</p>
</div>

<div class="container py-3">
    <div class="d-flex justify-content-between align-items-center bg-dark p-3 rounded-3 mb-3 border border-secondary shadow-inner">
        <span class="fw-bold text-white-50"><span id="ui-lbl-table">طاولة</span>: <span id="dom-table-id" class="text-warning fw-bold">1</span></span>
        <span id="dom-order-status" class="badge bg-secondary py-2 px-3 fw-bold">لا توجد طلبات جارية</span>
    </div>

    <div id="dom-waiter-box" class="alert alert-dark text-center py-2 small fw-bold d-none border-warning text-warning">
        <i class="bi bi-info-circle"></i> <span id="dom-waiter-text">جاري إرسال إشعار طلب الخدمة...</span>
    </div>

    <div class="category-badge-scroller" id="dom-categories-list"></div>
    <div id="dom-menu-grid" class="row g-3 mt-1"></div>
</div>

<div class="modal fade" id="orderReviewModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-md">
        <div class="modal-content bg-dark text-light border border-secondary">
            <div class="modal-header border-secondary py-3">
                <h6 class="modal-title fw-bold text-warning"><i class="bi bi-card-checklist"></i> مراجعة الطلب وإضافة ملاحظاتك</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-3">
                <div id="dom-review-items-list" class="mb-3 max-height-200 overflow-y-auto"></div>
                <div class="mb-2">
                    <label class="form-label small fw-bold text-white-50">ملاحظاتك الخاصة للمطبخ (مثال: بدون بصل، بدون سكر):</label>
                    <textarea id="dom-order-custom-notes" class="form-control bg-black text-white border-secondary small" rows="3" placeholder="اكتب ملاحظاتك هنا ليراها الطباخ مباشرة..."></textarea>
                </div>
            </div>
            <div class="modal-footer border-secondary">
                <button type="button" class="btn btn-sm btn-secondary" data-bs-dismiss="modal">تعديل الأطباق</button>
                <button type="button" class="btn btn-sm btn-success fw-bold" onclick="executeFinalOrderCommit()">تأكيد وإرسال للمطبخ</button>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="upsellModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content bg-dark text-light border border-secondary">
            <div class="modal-header border-secondary py-2">
                <h6 class="modal-title fw-bold text-warning" id="ui-suggest-title">نقترح عليك تذوق هذه الأطباق الشهية</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-3 text-center">
                <p class="small text-white-50 mb-3" id="ui-suggest-desc">أطباق مشابهة ومكملة لطلبك جاهزة وفريش من المطبخ:</p>
                <div id="dom-suggest-box" class="d-flex flex-column gap-2"></div>
            </div>
        </div>
    </div>
</div>

<div class="action-dock-bar">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="fw-bold"><span id="ui-lbl-cart">السلة</span>: <span id="dom-cart-count" class="text-warning">0</span> <span id="ui-lbl-items">أصناف</span></span>
            <span class="fw-bold fs-5"><span id="ui-lbl-total">المجموع</span>: <span id="dom-cart-total" class="text-success">0</span> د.ع</span>
        </div>
        <div class="row g-2">
            <div class="col-3"><button onclick="dispatchServiceCall('waiter')" class="btn btn-warning w-100 py-2 fw-bold text-dark"><i class="bi bi-bell"></i> <span id="ui-btn-waiter">نادل</span></button></div>
            <div class="col-3"><button id="dom-btn-bill" onclick="dispatchServiceCall('bill')" class="btn btn-danger w-100 py-2 fw-bold text-white" disabled><i class="bi bi-wallet2"></i> <span id="ui-btn-bill">حساب</span></button></div>
            <div class="col-6"><button onclick="openOrderReviewModal()" class="btn btn-success w-100 py-2 fw-bold text-white shadow-sm"><i class="bi bi-send-check"></i> <span id="ui-btn-send">إرسال الطلب</span></button></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="app.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC6fFl4gN2N-W7oK3v70g_v3P932fM6bNY",
        authDomain: "almenu-system.firebaseapp.com",
        databaseURL: "https://almenu-system-default-rtdb.firebaseio.com",
        projectId: "almenu-system"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    const params = new URLSearchParams(window.location.search);
    const currentTable = params.get('table') || "1";
    document.getElementById('dom-table-id').innerText = currentTable;

    let systemItems = [], clientCategories = ['الكل'], currentCategory = 'الكل', userCart = {};

    const clientDictionary = {
        AR: { mainTitle: "مطعم دجلة", subTitle: "أطباق ومأكولات طازجة محضرة بأعلى معايير الجودة", table: "طاولة", noOrder: "لا توجد طلبات جارية", preparing: "جاري تحضير وجبتك الساخنة بالمطبخ...", onWay: "الوجبة في طريقها لطاولتك الآن فريش", pending: "بانتظار موافقة الكاشير...", cart: "السلة", items: "أصناف", total: "المجموع", waiter: "نادل", bill: "حساب", send: "إرسال الطلب", suggestTitle: "نفدت كمية هذا الطبق حالياً", suggestDesc: "ولكن يمكنك تجربة أحد أطباقنا البديلة والمشابهة:", outStock: "نفدت الكمية" },
        EN: { mainTitle: "Dijla Restaurant", subTitle: "Fresh dishes prepared with highest quality standards", table: "Table", noOrder: "No active orders", preparing: "Preparing your hot meal in kitchen...", onWay: "Meal is on the way to your table now!", pending: "Awaiting cashier confirmation...", cart: "Cart", items: "items", total: "Total", waiter: "Waiter", bill: "Bill", send: "Place Order", suggestTitle: "Item out of stock currently", suggestDesc: "But you can try one of our fresh alternatives:", outStock: "Out of Stock" },
        KU: { mainTitle: "خواردنگەی دیجلە", subTitle: "خواردنی تازە بە بەرزترین کوالێتی ئامادەکراوە", table: "مێز", noOrder: "هیچ داواکارییەک چالاک نییە", preparing: "خواردنەکەت لە چێشتخانە ئاماد دەکرێت...", onWay: "خواردنەکە لەڕێگایە بۆ سەر مێزەکەت!", pending: "چاوەڕێی ڕەزامەندی کاشێرە...", cart: "سەبەتە", items: "بابەت", total: "کۆیی گشتی", waiter: "گارسۆن", bill: "حیساب", send: "ناردنی داواکاری", suggestTitle: "بڕی ئەم خواردنە تەواو بووە", suggestDesc: "بەڵام دەتوانیت یەکێک لەم جێگرەوانە تاقی بکەیتەوە:", outStock: "تەواو بووە" }
    };

    function changeLanguage(lang) {
        AppState.currentLang = lang;
        const dict = clientDictionary[lang];
        document.getElementById('ui-restaurant-name').innerText = dict.mainTitle;
        document.getElementById('ui-restaurant-sub').innerText = dict.subTitle;
        document.getElementById('ui-lbl-table').innerText = dict.table;
        document.getElementById('ui-lbl-cart').innerText = dict.cart;
        document.getElementById('ui-lbl-items').innerText = dict.items;
        document.getElementById('ui-lbl-total').innerText = dict.total;
        document.getElementById('ui-btn-waiter').innerText = dict.waiter;
        document.getElementById('ui-btn-bill').innerText = dict.bill;
        document.getElementById('ui-btn-send').innerText = dict.send;
        document.getElementById('ui-suggest-title').innerText = dict.suggestTitle;
        document.getElementById('ui-suggest-desc').innerText = dict.suggestDesc;
        renderMenuGrid();
    }

    firebase.database().ref('menu_data').on('value', (snapshot) => {
        const val = snapshot.val();
        if (val) {
            systemItems = val.items || [];
            clientCategories = ['الكل', ...(val.categories || [])];
            renderMenuGrid();
        }
    });

    NetworkBridge.initRealtimeStreams(currentTable, 
        (orderData) => {
            const banner = document.getElementById('dom-order-status');
            const billBtn = document.getElementById('dom-btn-bill');
            const dict = clientDictionary[AppState.currentLang];

            if (!orderData || !orderData.items || orderData.status === "completed") {
                banner.className = "badge bg-secondary py-2 px-3"; banner.innerText = dict.noOrder;
                billBtn.disabled = true; return;
            }
            if (orderData.status === "preparing") {
                banner.className = "badge bg-warning text-dark py-2 px-3"; banner.innerText = dict.preparing;
                billBtn.disabled = true;
            } else if (orderData.status === "on_the_way") {
                banner.className = "badge bg-success text-white py-2 px-3"; banner.innerText = dict.onWay;
                billBtn.disabled = false;
            } else {
                banner.className = "badge bg-info py-2 px-3 text-white"; banner.innerText = dict.pending;
                billBtn.disabled = true;
            }
        },
        (callData) => {
            const sBox = document.getElementById('dom-waiter-box');
            const sText = document.getElementById('dom-waiter-text');
            const toastElement = document.getElementById('toast-waiter-alert');

            if (callData && callData.active) {
                sBox.classList.remove('d-none');
                if (callData.status === "accepted") {
                    sText.innerText = "الويتر في طريقه إليك 🏃‍♂️";
                    if (!callData.toast_shown) {
                        toastElement.style.display = 'block';
                        firebase.database().ref(`waiter_calls/${currentTable}`).update({ toast_shown: true });
                        
                        // الإخفاء التلقائي للرسائل المنبثقة من الواجهة بعد 5 ثوانٍ لكي لا تبقى معلقة (حل مشكلة الصورة 1)
                        setTimeout(() => { 
                            toastElement.style.display = 'none'; 
                            sBox.classList.add('d-none');
                            firebase.database().ref(`waiter_calls/${currentTable}`).remove();
                        }, 5000);
                    }
                } else {
                    sText.innerText = callData.type === 'waiter' ? "تم إخطار النادل وبانتظار التلبية..." : "جاري مراجعة طلب الفاتورة الكلية...";
                }
            } else {
                sBox.classList.add('d-none');
            }
        }
    );

    function renderMenuGrid() {
        document.getElementById('dom-categories-list').innerHTML = clientCategories.map(c => `
            <button class="cat-item-btn ${c === currentCategory ? 'active' : ''}" onclick="filterCategory('${c}')">${c}</button>
        `).join('');

        const grid = document.getElementById('dom-menu-grid'); grid.innerHTML = '';
        const dict = clientDictionary[AppState.currentLang];

        const targetItems = currentCategory === 'الكل' ? systemItems : systemItems.filter(i => i.cat === currentCategory);
        
        if(targetItems.length === 0) {
            grid.innerHTML = `<div class="col-12 text-center text-muted py-5">لا توجد أطباق متاحة حالياً.</div>`;
            return;
        }

        targetItems.forEach(item => {
            const isOut = item.available === false || (item.stock !== undefined && item.stock <= 0);
            const card = document.createElement('div'); card.className = "col-12 col-md-6";
            const qty = userCart[item.name] ? userCart[item.name].quantity : 0;

            card.innerHTML = `
                <div class="card dish-card p-3 ${isOut ? 'dish-disabled' : ''}" onclick="handleCardClick('${item.name}', '${item.cat}', ${isOut})">
                    ${isOut ? `<span class="badge-out">${dict.outStock}</span>` : ''}
                    <div class="d-flex align-items-center">
                        <img src="${item.img || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=150'}" class="dish-img me-3">
                        <div class="flex-grow-1">
                            <h6 class="fw-bold mb-1 text-white">${item.name}</h6>
                            <span class="fw-bold text-warning">${Number(item.price).toLocaleString()} د.ع</span>
                        </div>
                        <div class="d-flex align-items-center bg-dark p-1 rounded-pill border border-secondary" onclick="event.stopPropagation();">
                            <button class="counter-btn" onclick="modifyCartQty('${item.name}', ${item.price}, -1, '${item.cat}')">-</button>
                            <span class="fw-bold mx-2" id="ui-qty-${item.name}">${qty}</span>
                            <button class="counter-btn" onclick="modifyCartQty('${item.name}', ${item.price}, 1, '${item.cat}')">+</button>
                        </div>
                    </div>
                </div>
            `;
            grid.appendChild(card);
        });
    }

    function filterCategory(cat) { currentCategory = cat; renderMenuGrid(); }
    function handleCardClick(name, cat, isOut) { if(isOut) { triggerSmartUpsell(cat); } }

    function modifyCartQty(name, price, delta, cat) {
        const itemInfo = systemItems.find(i => i.name === name);
        const stock = itemInfo ? (itemInfo.stock || 0) : 0;
        const isOut = itemInfo ? (itemInfo.available === false || stock <= 0) : true;

        if (isOut && delta > 0) { triggerSmartUpsell(cat); return; }
        if (!userCart[name]) userCart[name] = { name, price, quantity: 0, cat };
        
        if (delta > 0 && userCart[name].quantity >= stock) {
            triggerSmartUpsell(cat);
            return;
        }

        userCart[name].quantity += delta;
        if (userCart[name].quantity <= 0) delete userCart[name];
        
        if(document.getElementById(`ui-qty-${name}`)) {
            document.getElementById(`ui-qty-${name}`).innerText = userCart[name] ? userCart[name].quantity : 0;
        }
        syncCartDock();
    }

    function triggerSmartUpsell(catName) {
        const container = document.getElementById('dom-suggest-box'); container.innerHTML = '';
        const alternatives = systemItems.filter(i => i.cat === catName && i.available !== false && i.stock > 0).slice(0, 3);
        if(alternatives.length > 0) {
            alternatives.forEach(alt => {
                const row = document.createElement('button');
                row.className = "btn btn-outline-warning w-100 text-white text-end py-2 px-3 rounded-3 small";
                row.innerHTML = `<div class="d-flex justify-content-between"><span>🍽️ ${alt.name}</span><span class="text-success fw-bold">${alt.price.toLocaleString()} د.ع</span></div>`;
                row.onclick = () => {
                    modifyCartQty(alt.name, alt.price, 1, alt.cat);
                    renderMenuGrid();
                    bootstrap.Modal.getInstance(document.getElementById('upsellModal')).hide();
                };
                container.appendChild(row);
            });
        } else {
            container.innerHTML = `<p class="small text-muted py-2">يرجى تصفح بقية أقسام القائمة المتاحة لتجربة أطباقنا الطازجة.</p>`;
        }
        new bootstrap.Modal(document.getElementById('upsellModal')).show();
    }

    function syncCartDock() {
        let cnt = 0, total = 0;
        Object.values(userCart).forEach(i => { cnt += i.quantity; total += (i.price * i.quantity); });
        document.getElementById('dom-cart-count').innerText = cnt;
        document.getElementById('dom-cart-total').innerText = total.toLocaleString();
    }

    // فتح نافذة مراجعة جميع الطلبات مع حقل كتابة الملاحظات الذكي قبل الإرسال النهائي للمطبخ
    function openOrderReviewModal() {
        if (Object.keys(userCart).length === 0) return;
        const listContainer = document.getElementById('dom-review-items-list');
        listContainer.innerHTML = '';
        
        Object.values(userCart).forEach(item => {
            listContainer.insertAdjacentHTML('beforeend', `
                <div class="d-flex justify-content-between align-items-center bg-black p-2 rounded mb-2 border border-secondary small">
                    <span class="fw-bold text-white">${item.name}</span>
                    <span class="badge bg-warning text-dark fw-bold">الكمية: x${item.quantity}</span>
                </div>
            `);
        });
        document.getElementById('dom-order-custom-notes').value = '';
        new bootstrap.Modal(document.getElementById('orderReviewModal')).show();
    }

    // إرسال الفاتورة بالكامل مع ميزة الملاحظات المخصصة وحماية المزامنة المحلية والشبكية
    async function executeFinalOrderCommit() {
        bootstrap.Modal.getInstance(document.getElementById('orderReviewModal')).hide();
        const customNotesText = document.getElementById('dom-order-custom-notes').value.trim();

        const now = Date.now();
        if (now - AppState.lastRequestTime < CONFIG.API_RATE_LIMIT_MS) return;
        AppState.lastRequestTime = now;

        const idempotencyKey = "key_order_" + currentTable + "_" + now;
        if(AppState.idempotencyKeys.has(idempotencyKey)) return;
        AppState.idempotencyKeys.add(idempotencyKey);

        Object.values(userCart).forEach(cartItem => {
            const idx = systemItems.findIndex(si => si.name === cartItem.name);
            if(idx !== -1) {
                systemItems[idx].stock = Math.max(0, (systemItems[idx].stock || 0) - cartItem.quantity);
                if(systemItems[idx].stock <= 0) systemItems[idx].available = false;
            }
        });

        const orderPayload = {
            items: userCart,
            total_price: Object.values(userCart).reduce((acc, i) => acc + (i.price * i.quantity), 0),
            status: "pending",
            order_notes: customNotesText || "لا توجد ملاحظات", // حفظ الملاحظة وإرسالها للمطبخ
            timestamp: now
        };

        if (AppState.isOffline) {
            await LocalDB.saveOrder({ id: currentTable, ...orderPayload });
            await LocalDB.queueForSync("PLACE_ORDER", { tableId: currentTable, order: orderPayload });
            showCustomAlert("تم حفظ طلبك وملاحظاتك محلياً! سيتم إرساله للمطبخ وتأكيده فور عودة اتصال الإنترنت بالشبكة.");
        } else {
            firebase.database().ref('menu_data/items').set(systemItems);
            firebase.database().ref(`orders_system/${currentTable}`).set(orderPayload).then(() => {
                showCustomAlert("تم إرسال طلبك وملاحظاتك بنجاح للمطبخ لتجهيز وجبتك.");
            });
        }

        userCart = {}; syncCartDock(); renderMenuGrid();
    }

    async function dispatchServiceCall(type) {
        const now = Date.now();
        const callPayload = { type, active: true, status: "pending", toast_shown: false, timestamp: now };

        if (AppState.isOffline) {
            await LocalDB.queueForSync("CALL_WAITER", { tableId: currentTable, call: callPayload });
            showCustomAlert("تم حفظ نداء الخدمة محلياً؛ سيصل للنادل فور عودة الشبكة.");
        } else {
            firebase.database().ref(`waiter_calls/${currentTable}`).set(callPayload).then(() => {
                showCustomAlert(type === 'waiter' ? "تم إرسال إشعار للنادل لخدمتك." : "تم طلب الحساب المالي الإجمالي للطاولة.");
            });
        }
    }
</script>
</body>
</html>
