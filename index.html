<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطعم دجلة - المنيو الذكي</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #e67e22;
            --dark-color: #2c3e50;
            --bg-color: #f8f9fa;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-color);
            color: var(--dark-color);
            padding-bottom: 60px;
        }

        .navbar-brand-custom {
            font-weight: 700;
            color: var(--dark-color);
        }

        /* شريط التصنيفات المرن للموبايل */
        .categories-container {
            overflow-x: auto;
            white-space: nowrap;
            -webkit-overflow-scrolling: touch;
            padding: 10px 0;
        }
        .categories-container::-webkit-scrollbar {
            display: none; /* إخفاء شريط التمرير المزعج */
        }

        .btn-category {
            border-radius: 50px;
            padding: 8px 20px;
            font-weight: 500;
            border: 1px solid #dee2e6;
            background: #fff;
            color: var(--dark-color);
            margin-left: 8px;
            transition: all 0.2s ease-in-out;
        }

        .btn-category.active, .btn-category:hover {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: #fff;
            box-shadow: 0 4px 10px rgba(230, 126, 34, 0.3);
        }

        /* كروت المنتجات الاحترافية */
        .product-card {
            background: #fff;
            border: none;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.04);
            transition: transform 0.2s;
        }
        
        .product-card:active {
            transform: scale(0.98);
        }

        .product-img-placeholder {
            width: 100%;
            height: 140px;
            background: #eaeded;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bdc3c7;
        }

        .product-title {
            font-size: 1.1rem;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .product-price {
            color: var(--primary-color);
            font-weight: 700;
            font-size: 1.05rem;
        }

        .admin-panel { 
            display: none; 
            background: #fff; 
            padding: 25px; 
            border-radius: 16px; 
            margin-top: 25px;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-light bg-white sticky-top shadow-sm">
    <div class="container justify-content-center">
        <span class="navbar-brand navbar-brand-custom fs-4">🍽️ قائمة مطعم دجلة</span>
    </div>
</nav>

<div class="container py-3">
    
    <div class="categories-container mb-3" id="filter-buttons">
        </div>

    <div id="menu-items" class="row g-3">
        </div>

    <hr class="my-5">

    <div class="d-grid gap-2">
        <button class="btn btn-outline-secondary btn-sm py-2" onclick="checkAdmin()">🔓 دخول لوحة الإدارة</button>
    </div>

    <div id="admin-panel" class="admin-panel shadow">
        <h5 class="border-bottom pb-2 mb-3 fw-bold text-danger">لوحة التحكم الإدارية</h5>
        
        <div class="mb-4">
            <h6 class="fw-bold">إضافة تصنيف جديد</h6>
            <div class="input-group mb-3">
                <input type="text" id="newCat" class="form-control" placeholder="مثال: مشويات، مقبلات">
                <button onclick="addCategory()" class="btn btn-success">إضافة</button>
            </div>
        </div>
        
        <div>
            <h6 class="fw-bold">إضافة صنف جديد للقائمة</h6>
            <div class="mb-2">
                <input type="text" id="itemName" class="form-control" placeholder="اسم الصنف (مثال: كباب دجاج)">
            </div>
            <div class="mb-2">
                <select id="itemCat" class="form-select"></select>
            </div>
            <div class="mb-3">
                <input type="number" id="itemPrice" class="form-control" placeholder="السعر (د.ع)">
            </div>
            <button onclick="addItem()" class="btn btn-primary w-100 py-2">إضافة الصنف للمنيو</button>
        </div>
    </div>
</div>

<script>
    // جلب البيانات المؤقتة من المتصفح لحين ربط Firebase الفعلي في الخطوة القادمة
    let items = JSON.parse(localStorage.getItem('items')) || [];
    let categories = JSON.parse(localStorage.getItem('categories')) || ['الكل'];
    let currentCategory = 'الكل';

    function render() {
        // بناء شريط أزرار التصنيفات
        document.getElementById('filter-buttons').innerHTML = categories.map(c => {
            const isActive = (c === currentCategory) ? 'active' : '';
            return `<button class="btn-category ${isActive}" onclick="filterMenu('${c}')">${c}</button>`;
        }).join('');
        
        // تحديث قائمة الخيارات داخل لوحة الإدارة
        const select = document.getElementById('itemCat');
        // نفلتر 'الكل' حتى لا تظهر عند إضافة صنف جديد
        const formCategories = categories.filter(c => c !== 'الكل');
        select.innerHTML = formCategories.map(c => `<option value="${c}">${c}</option>`).join('');
        if(formCategories.length === 0) {
            select.innerHTML = `<option value="">لا توجد تصنيفات مضافة</option>`;
        }

        filterMenu(currentCategory);
    }

    function renderItems(list) {
        const container = document.getElementById('menu-items');
        if(list.length === 0) {
            container.innerHTML = `
                <div class="col-10 text-center mx-auto py-5 text-muted">
                    <p class="fs-5">لا توجد أصناف متوفرة في هذا القسم حالياً.</p>
                </div>`;
            return;
        }

        container.innerHTML = list.map((item) => `
            <div class="col-6 col-md-4 col-lg-3">
                <div class="card product-card h-100">
                    <div class="product-img-placeholder">
                        <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" fill="currentColor" class="bi bi-egg-fried" viewBox="0 0 16 16">
                          <path d="M8 11a3 3 0 1 0 0-6 3 3 0 0 0 0 6z"/>
                          <path d="M13.997 5.17a5 5 0 0 0-8.101-4.09A5 5 0 0 0 1.28 9.342a5 5 0 0 0 8.336 5.109 3.5 3.5 0 0 0 5.201-4.065 3.001 3.001 0 0 0-.822-5.216zm-1-.034a1 1 0 0 0 .668.977 2.001 2.001 0 0 1 .547 3.478 1 1 0 0 0-.341 1.113 2.5 2.5 0 0 1-3.715 2.905 1 1 0 0 0-1.262.152 4 4 0 0 1-6.67-4.087 1 1 0 0 0-.2-1 4 4 0 0 1 3.693-6.61 1 1 0 0 0 .8-.2 4 4 0 0 1 6.48 3.273z"/>
                        </svg>
                    </div>
                    <div class="card-body p-3 d-flex flex-column justify-content-between">
                        <h5 class="product-title">${item.name}</h5>
                        <div class="d-flex justify-content-between align-items-center mt-2">
                            <span class="product-price">${Number(item.price).toLocaleString()} د.ع</span>
                        </div>
                    </div>
                </div>
            </div>`).join('');
    }

    function filterMenu(cat) {
        currentCategory = cat;
        // تحديث كلاس الفتح النشط في الأزرار دون إعادة بناء الهيدر بالكامل لمنع مشاكل الـ scroll
        const buttons = document.querySelectorAll('.btn-category');
        buttons.forEach(btn => {
            if(btn.innerText === cat) btn.classList.add('active');
            else btn.classList.remove('active');
        });

        if(cat === 'الكل') {
            renderItems(items);
        } else {
            renderItems(items.filter(i => i.cat === cat));
        }
    }

    function addCategory() {
        const input = document.getElementById('newCat');
        const val = input.value.trim();
        if(val && !categories.includes(val)) { 
            categories.push(val); 
            localStorage.setItem('categories', JSON.stringify(categories)); 
            input.value = '';
            render(); 
        }
    }

    function addItem() {
        const nameInput = document.getElementById('itemName');
        const priceInput = document.getElementById('itemPrice');
        const catSelect = document.getElementById('itemCat');

        const name = nameInput.value.trim();
        const price = priceInput.value.trim();
        const cat = catSelect.value;

        if(name && price && cat) {
            items.push({name, price, cat});
            localStorage.setItem('items', JSON.stringify(items));
            
            // تصفير الحقول بعد الإضافة الموفقة
            nameInput.value = '';
            priceInput.value = '';
            render();
        }
    }

    function checkAdmin() {
        const pass = prompt("أدخل كلمة مرور الإدارة الحماية المؤقتة:");
        if(pass === "123") {
            document.getElementById('admin-panel').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        } else {
            alert("كلمة المرور خاطئة!");
        }
    }

    // التشغيل الأولي للموقع
    render();
</script>
</body>
</html>
