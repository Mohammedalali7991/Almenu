<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو المطعم الذكي 🍽️</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background-color: #0f0f0f; color: #e0e0e0; padding: 15px; padding-bottom: 80px; }
        header { text-align: center; padding: 20px; background: #1a1a1a; border-radius: 12px; border: 1px solid #d4af37; margin-bottom: 20px; }
        h1 { color: #d4af37; font-size: 24px; }
        .table-info { display: inline-block; background: #333; color: #fff; padding: 5px 15px; border-radius: 20px; margin-top: 8px; font-weight: bold; font-size: 14px; }
        .product-card { background: #161616; border: 1px solid #2d2d2d; border-radius: 12px; padding: 15px; margin-bottom: 15px; display: flex; justify-content: space-between; align-items: center; }
        .product-info h3 { color: #fff; font-size: 16px; margin-bottom: 5px; }
        .product-info p { color: #d4af37; font-weight: bold; font-size: 14px; }
        .btn-add { background: #d4af37; color: #111; border: none; padding: 8px 15px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .service-buttons { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-service { flex: 1; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; text-align: center; font-size: 14px; }
        .btn-waiter { background: #e67e22; color: white; }
        .btn-bill { background: #2980b9; color: white; }
        .tracking-bar { position: fixed; bottom: 0; left: 0; right: 0; background: #1a1a1a; border-top: 2px solid #d4af37; padding: 12px; display: flex; justify-content: space-between; align-items: center; z-index: 1000; }
        .status-text { font-weight: bold; color: #27ae60; font-size: 14px; }
    </style>
</head>
<body>

    <header>
        <h1>مطعم النخبة الذكي 🌾</h1>
        <div class="table-info" id="tableBadge">طاولة: جاري التعرف...</div>
    </header>

    <div class="service-buttons">
        <button class="btn-service btn-waiter" onclick="callService('waiter')">🛎️ نداء الويتر</button>
        <button class="btn-service btn-bill" onclick="callService('bill')">🧾 طلب الفاتورة</button>
    </div>

    <div id="menuContainer">
        <div class="product-card">
            <div class="product-info"><h3>قوزي لحم عراقي فاخر</h3><p>18,000 د.ع</p></div>
            <button class="btn-add" onclick="addToCart('قوزي لحم عراقي فاخر', 18000)">إضافة +</button>
        </div>
        <div class="product-card">
            <div class="product-info"><h3>ستيك لحم بصلصة المشروم</h3><p>15,000 د.ع</p></div>
            <button class="btn-add" onclick="addToCart('ستيك لحم بصلصة المشروم', 15000)">إضافة +</button>
        </div>
    </div>

    <div style="text-align: center; margin-top: 20px;">
        <button class="btn-add" style="background:#27ae60; color:#fff; width:100%; padding:15px; font-size:16px;" onclick="sendOrderToFirebase()">🚀 إرسال الطلب للمطبخ والكاشير</button>
    </div>

    <div class="tracking-bar">
        <div>السلة: <span id="cartCount">0</span> أصناف</div>
        <div class="status-text" id="orderStatusLabel">الحالة: تصفح المنيو</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCEk80-ag9mv5JP9LRBZTq1_qiVKcwUQKQ",
            authDomain: "almenu-system.firebaseapp.com",
            databaseURL: "https://almenu-system-default-rtdb.firebaseio.com",
            projectId: "almenu-system",
            storageBucket: "almenu-system.firebasestorage.app",
            messagingSenderId: "259548428040",
            appId: "1:259548428040:web:8d156f73ed55cec3cadebd"
        };
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const database = firebase.database();

        const urlParams = new URLSearchParams(window.location.search);
        const tableNumber = urlParams.get('table') || "1";
        document.getElementById('tableBadge').innerText = `طاولة رقم: ${tableNumber}`;

        let cart = [];
        const tableKey = `table_${tableNumber}`;

        function addToCart(name, price) {
            const existing = cart.find(item => item.name === name);
            if (existing) { existing.quantity += 1; } 
            else { cart.push({ name, price, quantity: 1 }); }
            document.getElementById('cartCount').innerText = cart.reduce((sum, i) => sum + i.quantity, 0);
        }

        function sendOrderToFirebase() {
            if (cart.length === 0) { alert("سلتك فارغة!"); return; }
            let total = cart.reduce((sum, i) => sum + (i.price * i.quantity), 0);

            database.ref(`orders_system/${tableKey}`).set({
                table: tableNumber,
                items: cart,
                acc_total: total,
                status: "طلب_جديد",
                waiter_requested: false,
                bill_requested: false,
                timestamp: Date.now()
            }).then(() => { alert("🚀 تم إرسال طلبك بنجاح!"); });
        }

        function callService(type) {
            let updateData = { table: tableNumber };
            if(type === 'waiter') updateData.waiter_requested = true;
            if(type === 'bill') updateData.bill_requested = true;

            database.ref(`orders_system/${tableKey}`).update(updateData).then(() => {
                alert("🛎️ تم إرسال الإشعار للكاشير والمطبخ!");
            });
        }

        database.ref(`orders_system/${tableKey}`).on('value', (snapshot) => {
            const data = snapshot.val();
            if(data) {
                document.getElementById('orderStatusLabel').innerText = `الحالة: ${data.status || 'تحت المعالجة'}`;
            }
        });
    </script>
</body>
</html>
