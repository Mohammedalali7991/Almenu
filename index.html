<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قائمة طعام مطعم دجلة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css">
    <style>
        :root {
            --bg-premium: #131419;
            --card-premium: #1c1d24;
            --gold-premium: #c5a880;
            --text-light: #f3f4f6;
        }
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-premium); 
            color: var(--text-light);
            padding-bottom: 160px;
        }
        .brand-header {
            background: #1c1d24;
            padding: 30px 15px;
            text-align: center;
            border-bottom: 2px solid var(--gold-premium);
            border-radius: 0 0 25px 25px;
        }
        .categories-scroll {
            overflow-x: auto;
            white-space: nowrap;
            padding: 15px 0;
        }
        .categories-scroll::-webkit-scrollbar { display: none; }
        .btn-menu-cat {
            border-radius: 20px;
            padding: 8px 20px;
            font-weight: 600;
            border: 1px solid rgba(197, 168, 128, 0.2);
            background: var(--card-premium);
            color: var(--text-light);
            margin-left: 8px;
            transition: all 0.2s ease;
        }
        .btn-menu-cat.active {
            background: var(--gold-premium);
            color: #131419;
            border-color: var(--gold-premium);
        }
        .item-card {
            background: var(--card-premium);
            border-radius: 15px;
            border: 1px solid rgba(255,255,255,0.03);
            position: relative;
        }
        .item-disabled { opacity: 0.4; }
        .out-badge {
            position: absolute; top: 12px; left: 12px;
            background: #e74c3c; color: white; padding: 3px 10px;
            font-size: 0.7rem; border-radius: 8px; font-weight: bold;
        }
        .food-thumb {
            width: 80px; height: 80px; object-fit: cover;
            border-radius: 12px; border: 1px solid var(--gold-premium);
        }
        .qty-btn {
            width: 30px; height: 30px; border-radius: 50%;
            border: none; background: var(--gold-premium); color: #131419;
            font-weight: bold;
        }
        .customer-bar {
            position: fixed; bottom: 0; left: 0; right: 0;
            background: #1c1d24; padding: 15px; 
            border-top: 2px solid var(--gold-premium);
            border-radius: 20px 20px 0 0; z-index: 1050;
        }
        .group-title {
            font-weight: 700; color: var(--gold-premium);
            border-right: 3px solid var(--gold-premium);
            padding-right: 8px; margin-top: 20px; font-size: 1.1rem;
        }
        /* نافذة الإشعار المنبثقة الفخمة المؤقتة للزبون */
        .toast-notification {
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
            background: #10ac84; color: white; padding: 12px 25px;
            border-radius: 30px; z-index: 2000; font-weight: bold;
            box-shadow: 0 5px 20px rgba(0,0,0,0.4); display: none;
            animation: fadeInOut 5s forwards;
        }
        @keyframes fadeInOut {
            0% { opacity: 0; top: 0px; }
            10% { opacity: 1; top: 20px; }
            90% { opacity: 1; top: 20px; }
            100% { opacity: 0; top: 0px; display: none; }
        }
    </style>
</head>
<body>

<div id="toast-call-notification" class="toast-notification">🏃‍♂️ الويتر في طريقه إليك الآن!</div>

<div class="brand-header">
    <div class="position-absolute top-0 start-0 m-3">
        <div class="btn-group">
            <button class="btn btn-sm btn-outline-secondary text-white py-1 px-2" onclick="setLanguage('AR')">عربي</button>
            <button class="btn btn-sm btn-outline-secondary text-white py-1 px-2" onclick="setLanguage('EN')">EN</button>
            <button class="btn btn-sm btn-outline-secondary text-white py-1 px-2" onclick="setLanguage('KU')">كردي</button>
        </div>
    </div>
    <h3 class="fw-bold mb-1" id="lbl-main-title" style="color: var(--gold-premium);">مطعم دجلة</h3>
    <p class="small text-muted mb-0" id="lbl-main-sub">قائمة الأطباق والمأكولات الطازجة</p>
</div>

<div class="container py-3">
    <div class="d-flex justify-content-between align-items-center bg-dark p-3 rounded-3 mb-3 border border-secondary shadow-sm">
        <span class="fw-bold"><span id="lbl-table-text">طاولة</span>: <span id="table-number-display" class="text-warning">1</span></span>
        <span id="order-status-banner" class="badge bg-secondary p-2 fw-bold">لا يوجد طلب نشط</span>
    </div>

    <div id="waiter-status-box" class="alert alert-secondary text-center py-2 small fw-bold d-none" style="background: #1c1d24; border: 1px solid var(--gold-premium); color: var(--gold-premium);">
        <i class="bi bi-info-circle-fill"></i> <span id="waiter-status-text">جاري إرسال إشعار للخدمة...</span>
    </div>

    <div class="categories-scroll" id="categories-container"></div>
    
    <div id="menu-grid" class="row g-3 mt-1"></div>
</div>

<div class="modal fade" id="suggestionModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content bg-dark text-light border border-secondary">
            <div class="modal-header border-secondary py-2">
                <h6 class="modal-title fw-bold text-danger" id="lbl-suggest-title">عذراً، نفدت كمية هذا الطبق حالياً</h6>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body py-3 text-center">
                <p class="small text-white-50 mb-3" id="lbl-suggest-desc">ولكن يمكنك تجربة أحد أطباقنا البديلة الطازجة والمشابهة:</p>
                <div id="suggested-items-box" class="d-flex flex-column gap-2"></div>
            </div>
        </div>
    </div>
</div>

<div class="modal fade" id="customAlertModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content bg-dark text-light border border-secondary text-center p-3">
            <h6 class="fw-bold text-warning mb-2">مطعم دجلة</h6>
            <p class="small mb-3" id="customAlertMsg"></p>
            <button class="btn btn-sm btn-secondary w-100" data-bs-dismiss="modal">موافق</button>
        </div>
    </div>
</div>

<div class="customer-bar">
    <div class="container">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <span class="fw-bold"><span id="lbl-cart-text">السلة</span>: <span id="cart-count" class="text-warning">0</span> <span id="lbl-items-text">أصناف</span></span>
            <span class="fw-bold fs-5"><span id="lbl-total-text">المجموع</span>: <span id="cart-total" class="text-success">0</span> د.ع</span>
        </div>
        <div class="row g-2">
            <div class="col-3"><button onclick="sendServiceCall('waiter')" class="btn btn-warning w-100 py-2 fw-bold text-dark"><i class="bi bi-bell"></i> <span id="lbl-btn-waiter">نادل</span></button></div>
            <div class="col-3"><button id="btn-request-bill" onclick="sendServiceCall('bill')" class="btn btn-danger w-100 py-2 fw-bold text-white" disabled><i class="bi bi-wallet2"></i> <span id="lbl-btn-bill">حساب</span></button></div>
            <div class="col-6"><button onclick="sendOrderToFirebase()" class="btn btn-success w-100 py-2 fw-bold text-white shadow"><i class="bi bi-send-check"></i> <span id="lbl-btn-send">إرسال الطلب</span></button></div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC6fFl4gN2N-W7oK3v70g_v3P932fM6bNY",
        authDomain: "almenu-system.firebaseapp.com",
        databaseURL: "https://almenu-system-default-rtdb.firebaseio.com",
        projectId: "almenu-system",
        storageBucket: "almenu-system.appspot.com",
        messagingSenderId: "305206060548",
        appId: "1:305206060548:web:b1d79aa3ec2c2cc2ebbb9d"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const urlParams = new URLSearchParams(window.location.search);
    const tableNo = urlParams.get('table') || "1";
    document.getElementById('table-number-display').innerText = tableNo;

    let localItems = [], localCategories = ['الكل'], activeCategory = 'الكل', cart = {};
    let currentLang = 'AR';

    // قاموس الترجمة للغات الثلاث (العربية، الإنجليزية، الكردية)
    const dictionary = {
        AR: { mainTitle: "مطعم دجلة", mainSub: "قائمة الأطباق والمأكولات الطازجة", table: "طاولة", noOrder: "لا يوجد طلب نشط", preparing: "جاري تحضير الوجبة بالمطبخ...", onWay: "الوجبة في طريقها لطاولتك فريش", pending: "بانتظار موافقة الكاشير...", cart: "السلة", items: "أصناف", total: "المجموع", waiter: "نادل", bill: "حساب", send: "إرسال الطلب", suggestTitle: "عذراً، نفدت كمية هذا الطبق حالياً", suggestDesc: "ولكن يمكنك تجربة أحد أطباقنا البديلة الطازجة والمشابهة:", outStock: "نفد من المخزن" },
        EN: { mainTitle: "Dijla Restaurant", mainSub: "Fresh Dishes & Cuisine Menu", table: "Table", noOrder: "No active order", preparing: "Preparing meal in kitchen...", onWay: "Meal is on the way to your table!", pending: "Awaiting cashier approval...", cart: "Cart", items: "items", total: "Total", waiter: "Waiter", bill: "Bill", send: "Place Order", suggestTitle: "Sorry, this item is out of stock", suggestDesc: "But you can try one of our fresh alternatives:", outStock: "Out of Stock" },
        KU: { mainTitle: "خواردنگەی دیجلە", mainSub: "لیستی خواردن و شیوە تازەکان", table: "مێز", noOrder: "هیچ داواکارییەک چالاک نییە", preparing: "خواردنەکە لە چێشتخانە ئامادە دەکرێت...", onWay: "خواردنەکە لەڕێگایە بۆ سەر مێزەکەت!", pending: "چاوەڕێی ڕەزامەندی کاشێرە...", cart: "سەبەتە", items: "بابەت", total: "کۆیی گشتی", waiter: "گارسۆن", bill: "حیساب", send: "ناردنی داواکاری", suggestTitle: "ببوورە، بڕی ئەم خواردنە تەواو بووە", suggestDesc: "بەڵام دەتوانیت یەکێک لەم جێگرەوانە تاقی بکەیتەوە:", outStock: "تەواو بووە" }
    };

    function setLanguage(lang) {
        currentLang = lang;
        const dict = dictionary[lang];
        document.getElementById('lbl-main-title').innerText = dict.mainTitle;
        document.getElementById('lbl-main-sub').innerText = dict.mainSub;
        document.getElementById('lbl-table-text').innerText = dict.table;
        document.getElementById('lbl-cart-text').innerText = dict.cart;
        document.getElementById('lbl-items-text').innerText = dict.items;
        document.getElementById('lbl-total-text').innerText = dict.total;
        document.getElementById('lbl-btn-waiter').innerText = dict.waiter;
        document.getElementById('lbl-btn-bill').innerText = dict.bill;
        document.getElementById('lbl-btn-send').innerText = dict.send;
        document.getElementById('lbl-suggest-title').innerText = dict.suggestTitle;
        document.getElementById('lbl-suggest-desc').innerText = dict.suggestDesc;
        renderClientMenu();
    }

    // مزامنة المنيو العام وقراءة البيانات الحالية
    database.ref('menu_data').on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) { localItems = data.items || []; localCategories = ['الكل', ...(data.categories || [])]; }
        renderClientMenu();
    });

    // مراقبة مسار الطلبات الخاص بالطاولة الحالية
    database.ref(`orders_system/${tableNo}`).on('value', (snapshot) => {
        const orderData = snapshot.val();
        const banner = document.getElementById('order-status-banner');
        const billBtn = document.getElementById('btn-request-bill');
        const dict = dictionary[currentLang];

        if (!orderData || !orderData.items || orderData.status === "completed") {
            banner.className = "badge bg-secondary p-2"; banner.innerText = dict.noOrder;
            billBtn.disabled = true; return;
        }

        if (orderData.status === "preparing") {
            banner.className = "badge bg-warning text-dark p-2"; banner.innerText = dict.preparing;
            billBtn.disabled = true;
        } else if (orderData.status === "on_the_way") {
            banner.className = "badge bg-success p-2 text-white"; banner.innerText = dict.onWay;
            billBtn.disabled = false;
        } else {
            banner.className = "badge bg-info p-2 text-white"; banner.innerText = dict.pending;
            billBtn.disabled = true;
        }
    });

    // نظام المتابعة المستقل والمباشر لنداء النادل والرسائل المنبثقة للزبون
    database.ref(`waiter_calls/${tableNo}`).on('value', (snapshot) => {
        const callData = snapshot.val();
        const statusBox = document.getElementById('waiter-status-box');
        const statusText = document.getElementById('waiter-status-text');
        const toastNotification = document.getElementById('toast-call-notification');

        if (callData && callData.active) {
            statusBox.classList.remove('d-none');
            if (callData.status === "accepted") {
                statusText.innerText = "الويتر في طريقه إليك 🏃‍♂️";
                // إطلاق الرسالة المنبثقة الراقية لمدة 5 ثوانٍ فقط عند تلبية النداء
                if (!callData.toast_shown) {
                    toastNotification.style.display = 'block';
                    database.ref(`waiter_calls/${tableNo}`).update({ toast_shown: true });
                    setTimeout(() => { toastNotification.style.display = 'none'; }, 5000);
                }
            } else {
                statusText.innerText = callData.type === 'waiter' ? "تم إرسال نداء للنادل وبانتظار التوجه إليك..." : "تم إرسال طلب الحساب الكلي للطاولة...";
            }
        } else {
            statusBox.classList.add('d-none');
        }
    });

    function renderClientMenu() {
        document.getElementById('categories-container').innerHTML = localCategories.map(c => `
            <button class="btn-menu-cat ${c === activeCategory ? 'active' : ''}" onclick="switchCategory('${c}')">${c}</button>
        `).join('');

        const grid = document.getElementById('menu-grid'); grid.innerHTML = '';
        const dict = dictionary[currentLang];

        if (activeCategory === 'الكل') {
            const realCategories = localCategories.filter(c => c !== 'الكل');
            realCategories.forEach(catName => {
                const catItems = localItems.filter(i => i.cat === catName);
                if(catItems.length > 0) {
                    const titleDiv = document.createElement('div');
                    titleDiv.className = "col-12 group-title"; titleDiv.innerText = catName; grid.appendChild(titleDiv);
                    catItems.forEach(item => grid.appendChild(createItemCard(item, dict)));
                }
            });
        } else {
            const filtered = localItems.filter(i => i.cat === activeCategory);
            if (filtered.length === 0) { grid.innerHTML = `<div class="col-12 text-center py-5 text-muted">لا توجد أطباق متوفرة هنا.</div>`; return; }
            filtered.forEach(item => grid.appendChild(createItemCard(item, dict)));
        }
    }

    function createItemCard(item, dict) {
        const col = document.createElement('div'); col.className = "col-12 col-md-6";
        const isOutOfStock = item.available === false || (item.stock !== undefined && item.stock <= 0);
        const qty = cart[item.name] ? cart[item.name].quantity : 0;
        
        col.innerHTML = `
            <div class="card item-card p-3 ${isOutOfStock ? 'item-disabled' : ''}">
                ${isOutOfStock ? `<span class="out-badge">${dict.outStock}</span>` : ''}
                <div class="d-flex align-items-center">
                    <img src="${item.img || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=200'}" class="food-thumb me-3">
                    <div class="flex-grow-1">
                        <h6 class="fw-bold mb-1 text-white">${item.name}</h6>
                        <span class="text-warning fw-bold fs-6">${Number(item.price).toLocaleString()} د.ع</span>
                    </div>
                    <div class="d-flex align-items-center bg-dark p-1 rounded-pill border border-secondary shadow-inner">
                        <button class="qty-btn" onclick="updateCart('${item.name}', ${item.price}, -1, '${item.cat}', ${isOutOfStock})">-</button>
                        <span class="fw-bold mx-2 text-white" id="qty-${item.name}">${qty}</span>
                        <button class="qty-btn" onclick="updateCart('${item.name}', ${item.price}, 1, '${item.cat}', ${isOutOfStock})">+</button>
                    </div>
                </div>
            </div>
        `;
        return col;
    }

    function switchCategory(cat) { activeCategory = cat; renderClientMenu(); }

    // التحكم بالسلة ومحرك اقتراحات الأطباق المشابهة والبديلة عند نفاذ الكمية
    function updateCart(name, price, change, cat, isOutOfStock) {
        if (isOutOfStock && change > 0) {
            triggerAlternativeSuggestions(cat);
            return;
        }

        const originalItem = localItems.find(i => i.name === name);
        const maxStock = originalItem ? (originalItem.stock || 0) : 999;
        
        if (!cart[name]) cart[name] = { name, price, quantity: 0 };
        if (change > 0 && cart[name].quantity >= maxStock) {
            triggerAlternativeSuggestions(cat);
            return;
        }

        cart[name].quantity += change; if (cart[name].quantity <= 0) delete cart[name];
        if(document.getElementById(`qty-${name}`)) document.getElementById(`qty-${name}`).innerText = cart[name] ? cart[name].quantity : 0;
        updateCartSummary();
    }

    // محرك الاقتراحات الذكي للأطباق المشابهة من نفس فئة ومجموع الصنف النافذ تلقائياً
    function triggerAlternativeSuggestions(categoryName) {
        const suggestionsBox = document.getElementById('suggested-items-box');
        suggestionsBox.innerHTML = '';
        
        // جلب الأطباق المتوفرة من نفس الفئة لاستعراضها كبديل
        const alternatives = localItems.filter(i => i.cat === categoryName && i.available !== false && (i.stock || 0) > 0).slice(0, 3);
        
        if (alternatives.length > 0) {
            alternatives.forEach(alt => {
                const btn = document.createElement('button');
                btn.className = "btn btn-outline-warning text-white py-2 w-100 fw-bold rounded-3 mb-1 text-end px-3";
                btn.innerHTML = `<div class="d-flex justify-content-between"><span>🍽️ ${alt.name}</span><span class="text-success">${alt.price.toLocaleString()} د.ع</span></div>`;
                btn.onclick = () => {
                    updateCart(alt.name, alt.price, 1, alt.cat, false);
                    renderClientMenu();
                    bootstrap.Modal.getInstance(document.getElementById('suggestionModal')).hide();
                };
                suggestionsBox.appendChild(btn);
            });
        } else {
            suggestionsBox.innerHTML = '<p class="small text-muted py-2">يرجى مراجعة وتصفح بقية أقسام المنيو لتذوق أطباقنا الأخرى المتوفرة.</p>';
        }

        const suggestModal = new bootstrap.Modal(document.getElementById('suggestionModal'));
        suggestModal.show();
    }

    function updateCartSummary() {
        let count = 0; let total = 0; Object.values(cart).forEach(i => { count += i.quantity; total += (i.price * i.quantity); });
        document.getElementById('cart-count').innerText = count; document.getElementById('cart-total').innerText = total.toLocaleString();
    }

    // إرسال الفاتورة والطلب والاحتفاظ ببيان الطعام كاملاً باللغة العربية دائماً لإدارة المطبخ والكاشير
    function sendOrderToFirebase() {
        if (Object.keys(cart).length === 0) return;
        
        Object.values(cart).forEach(cartItem => {
            const itemIndex = localItems.findIndex(li => li.name === cartItem.name);
            if(itemIndex !== -1) {
                localItems[itemIndex].stock = Math.max(0, (localItems[itemIndex].stock || 0) - cartItem.quantity);
                if(localItems[itemIndex].stock <= 0) localItems[itemIndex].available = false;
            }
        });
        database.ref('menu_data/items').set(localItems);

        database.ref(`orders_system/${tableNo}`).set({
            items: cart, total_price: Object.values(cart).reduce((sum, i) => sum + (i.price * i.quantity), 0), status: "pending"
        }).then(() => { 
            showCustomAlert("تم إرسال طلبك بنجاح وجاري البدء في تجهيز الوجبة."); 
            cart = {}; updateCartSummary(); renderClientMenu(); 
        });
    }

    // إرسال نداء خدمة مستقل كلياً عن الطلبات وفواتير المطبخ للتحكم بالصالة
    function sendServiceCall(callType) {
        database.ref(`waiter_calls/${tableNo}`).set({
            type: callType, active: true, status: "pending", toast_shown: false
        }).then(() => {
            showCustomAlert(callType === 'waiter' ? "تم إخطار النادل، وسوف يتوجه إليك في أقرب وقت." : "تم إرسال طلب الحساب والتدقيق المالي.");
        });
    }

    function showCustomAlert(msg) {
        document.getElementById('customAlertMsg').innerText = msg;
        const myModal = new bootstrap.Modal(document.getElementById('customAlertModal'));
        myModal.show();
    }
</script>
</body>
</html>
