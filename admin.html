<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة المنيو</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #f4f6f7; }
        .admin-card { background: #fff; border: none; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.05); }
        .img-preset-option { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; cursor: pointer; border: 2px solid transparent; margin: 3px; transition: all 0.2s; }
        .img-preset-option.selected { border-color: #0d6efd; box-shadow: 0 0 8px rgba(13, 110, 253, 0.4); transform: scale(1.05); }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="card admin-card p-4">
        <h2 class="fw-bold mb-4">⚙️ لوحة تحكم مدير المطعم</h2>
        
        <div class="mb-4 border-bottom pb-4">
            <h5 class="text-success fw-bold">إدارة التصنيفات</h5>
            <div class="row g-2">
                <div class="col-8 col-md-10"><input type="text" id="newCat" class="form-control" placeholder="اسم التصنيف الجديد"></div>
                <div class="col-4 col-md-2"><button onclick="addCategory()" class="btn btn-success w-100">إضافة</button></div>
            </div>
        </div>

        <div class="mb-5 border-bottom pb-4">
            <h5 class="text-primary fw-bold">إضافة صنف جديد للمنيو مع الصورة</h5>
            <div class="row g-3">
                <div class="col-12 col-md-4"><label class="form-label small fw-bold">اسم الصنف</label><input type="text" id="itemName" class="form-control" placeholder="مثال: كباب دجاج"></div>
                <div class="col-12 col-sm-6 col-md-4"><label class="form-label small fw-bold">القسم</label><select id="itemCat" class="form-select"></select></div>
                <div class="col-12 col-sm-6 col-md-4"><label class="form-label small fw-bold">السعر (د.ع)</label><input type="number" id="itemPrice" class="form-control" placeholder="السعر"></div>
                
                <div class="col-12">
                    <label class="form-label small fw-bold text-dark d-block">📸 اختر صورة الطبق من القائمة الذكية:</label>
                    <div class="d-flex flex-wrap p-2 border rounded bg-light" id="preset-images-container">
                        </div>
                    <input type="hidden" id="itemImgSelected" value="https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=150&auto=format&fit=crop">
                </div>

                <div class="col-12 d-flex align-items-end"><button onclick="addItem()" class="btn btn-primary w-100 py-2 fw-bold">حفظ الصنف داخل المنيو الحية</button></div>
            </div>
        </div>
        
        <div>
            <h5 class="text-danger fw-bold">الأصناف المضافة حالياً</h5>
            <div class="table-responsive shadow-sm rounded-3 mt-2">
                <table class="table table-hover align-middle mb-0 text-center">
                    <thead class="table-dark">
                        <tr><th>الصورة</th><th>اسم الصنف</th><th>القسم</th><th>السعر</th><th>إجراءات</th></tr>
                    </thead>
                    <tbody id="admin-table-items"></tbody>
                </table>
            </div>
        </div>
        <div class="mt-4"><a href="index.html" class="btn btn-outline-secondary">📋 العودة للمنيو</a></div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "AIzaSyC6fFl4gN2N-W7oK3v70g_v3P932fM6bNY",
        authDomain: "almenu-system.firebaseapp.com",
        databaseURL: "https://almenu-system-default-rtdb.firebaseio.com",
        projectId: "almenu-system",
        storageBucket: "almenu-system.appspot.com",
        messagingSenderId: "305206060548",
        appId: "1:305206060548:web:b1d79aa3ec2c2cc2ebbb9d"
    };
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);

    // مكتبة من الصور الاحترافية والمضغوطة لسرعة فتح المنيو على هواتف الزبائن
    const foodGallery = [
        { title: "سلطة ومقبلات", url: "https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=150&auto=format&fit=crop" },
        { title: "مشاوي وكباب", url: "https://images.unsplash.com/photo-1555939594-58d7cb561ad1?w=150&auto=format&fit=crop" },
        { title: "بيتزا فخمة", url: "https://images.unsplash.com/photo-1513104890138-7c749659a591?w=150&auto=format&fit=crop" },
        { title: "برغر فخم", url: "https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=150&auto=format&fit=crop" },
        { title: "شاورما وقص", url: "https://images.unsplash.com/photo-1633424233228-56dfc1e195cf?w=150&auto=format&fit=crop" },
        { title: "أرز ومطابخ بشرق", url: "https://images.unsplash.com/photo-1512058564366-18510be2db19?w=150&auto=format&fit=crop" },
        { title: "حلويات وافل", url: "https://images.unsplash.com/photo-1563729784474-d77dbb933a9e?w=150&auto=format&fit=crop" },
        { title: "عصائر ومشروبات", url: "https://images.unsplash.com/photo-1536935338788-846bb9981813?w=150&auto=format&fit=crop" }
    ];

    document.addEventListener("DOMContentLoaded", () => {
        const container = document.getElementById("preset-images-container");
        container.innerHTML = foodGallery.map((img, i) => `
            <img src="${img.url}" class="img-preset-option ${i===0?'selected':''}" title="${img.title}" onclick="selectPresetImg(this, '${img.url}')">
        `).join('');
    });

    function selectPresetImg(el, url) {
        document.querySelectorAll(".img-preset-option").forEach(i => i.classList.remove("selected"));
        el.classList.add("selected");
        document.getElementById("itemImgSelected").value = url;
    }
</script>
<script src="app.js"></script>
</body>
</html>
