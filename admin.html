<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم المطبخ والإدارة الشاملة</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-storage.js"></script>

    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: #0a0a0a; color: #e6e6e6; padding: 15px; }
        
        /* شريط القوائم الرئيسية العلوي المحاور */
        .tabs-container { display: flex; gap: 12px; margin-bottom: 20px; border-bottom: 2px solid #222; padding-bottom: 12px; }
        .tab-btn { flex: 1; padding: 16px; background: #161616; border: 1px solid #2a2a2a; color: #fff; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; transition: 0.3s; text-align: center; }
        .tab-btn.active { background: #d4af37; color: #0a0a0a; border-color: #d4af37; box-shadow: 0 4px 12px rgba(212, 175, 55, 0.2); }
        
        /* التحكم بالظهور */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        /* زر التحكم بالصوت المساعد */
        .audio-ctrl { background: #22c55e; color: white; padding: 12px; border: none; border-radius: 8px; font-weight: bold; margin-bottom: 20px; cursor: pointer; width: 100%; font-size: 15px; transition: 0.3s; }

        /* تقسيم الشاشة بشكل متجاوب */
        .grid-section { display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 20px; }
        @media(min-width: 768px) { .grid-section { grid-template-columns: 2fr 1fr; } }
        
        .card { background: #121212; border: 1px solid #222; border-radius: 12px; padding: 18px; margin-bottom: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .card-title { font-size: 18px; color: #d4af37; margin-bottom: 15px; border-bottom: 1px solid #2a2a2a; padding-bottom: 8px; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        
        .waiter-card { background: #1f1212; border-color: #ef4444; }
        .btn-action { padding: 10px 18px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; margin-top: 12px; font-size: 14px; transition: 0.2s; }
        .btn-done { background: #22c55e; color: white; }
        .btn-done:hover { background: #16a34a; }
        .btn-del { background: #ef4444; color: white; }
        .btn-del:hover { background: #dc2626; }
        
        /* حقول الإدخال لتعديل المنيو */
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; margin-bottom: 6px; color: #b3b3b3; font-size: 14px; }
        .form-group input, .form-group select { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #333; color: white; border-radius: 6px; font-size: 15px; }
        .form-group input:focus, .form-group select:focus { border-color: #d4af37; outline: none; }
        .btn-add-product { background: #d4af37; color: #0a0a0a; width: 100%; padding: 14px; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.3s; }
        .btn-add-product:hover { background: #b8952e; }
        
        /* صفوف التحكم بالأطباق الحالية */
        .menu-item-row { display: flex; justify-content: space-between; align-items: center; padding: 12px; background: #161616; border: 1px solid #222; border-radius: 8px; margin-bottom: 10px; }
        .menu-item-info { display: flex; align-items: center; gap: 12px; }
        .menu-item-img { width: 50px; height: 50px; border-radius: 6px; object-fit: cover; background: #222; }
        .toggle-switch { padding: 8px 14px; border-radius: 6px; font-size: 13px; font-weight: bold; border: none; cursor: pointer; transition: 0.2s; }
        .status-on { background: #22c55e; color: white; }
        .status-off { background: #ef4444; color: white; }
        
        ul { padding-right: 20px; margin-top: 5px; color: #ccc; }
        li { margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="tabs-container">
        <div class="tab-btn active" onclick="switchTab('orders-tab', this)">🛎️ الطلبات والنداءات الحية</div>
        <div class="tab-btn" onclick="switchTab('management-tab', this)">⚙️ التحكم وتعديل المنيو</div>
    </div>

    <button id="mute-btn" class="audio-ctrl" onclick="AudioSystem.toggleMute('mute-btn')">🔊 كتم الصوت المساعد (اضغط لتنشيط الصوت)</button>

    <div id="orders-tab" class="tab-content active">
        <div class="grid-section">
            <div>
                <h2 style="margin-bottom: 10px; font-size: 20px;">📋 طلبات الطاولات الجارية</h2>
                <div id="orders-container"></div>
            </div>
            <div>
                <h2 style="margin-bottom: 10px; font-size: 20px;">🙋‍♂️ نداءات النادل النشطة</h2>
                <div id="waiter-container"></div>
            </div>
        </div>
    </div>

    <div id="management-tab" class="tab-content">
        <div class="grid-section">
            <div class="card">
                <div class="card-title">➕ إضافة طبق أو مشروب جديد للمنيو</div>
                <div class="form-group">
                    <label>اسم الطبق / المشروب:</label>
                    <input type="text" id="prod-name" placeholder="مثال: قوزي لحم عراقي فاخر">
                </div>
                <div class="form-group">
                    <label>السعر (د.ع):</label>
                    <input type="number" id="prod-price" placeholder="مثال: 24000">
                </div>
                <div class="form-group">
                    <label>الفئة:</label>
                    <select id="prod-category">
                        <option value="western">أكلات غربية</option>
                        <option value="eastern">أكلات شرقية</option>
                        <option value="appetizers">مقبلات وطواجن</option>
                        <option value="drinks">مشروبات وعصائر</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>صورة الطبق (اختر من ألبوم الهاتف):</label>
                    <input type="file" id="prod-image" accept="image/*" style="padding: 6px;">
                </div>
                <button class="btn-add-product" id="btn-submit-prod" onclick="addNewProductWithImage()">حفظ وإضافة للمنيو السحابي</button>
            </div>

            <div class="card">
                <div class="card-title">🍔 إدارة وتعديل حالة الأطباق الحالية</div>
                <div id="admin-menu-list"></div>
            </div>
        </div>
    </div>

    <script>
        // ⚠️ ضع هنا أسطر ربط الـ firebaseConfig الحقيقية الخاصة بمشروعك المتطابقة مع ملف index.html لربط السيرفرين
        const firebaseConfig = {
            apiKey: "AIzaSy...", 
            authDomain: "almenu-...",
            projectId: "almenu-...", 
            storageBucket: "almenu-...",
            messagingSenderId: "...",
            appId: "..."
        };
        
        if (!firebase.apps.length) { firebase.initializeApp(firebaseConfig); }
        const db = firebase.firestore();
        const storage = firebase.storage();

        // التبديل الدقيق والكامل بين التبويبين
        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        // 🔊 نظام الأصوات النقي ذكياً لطلبات المطبخ وأجراس نداء النادل المختلفة
        const AudioSystem = {
            isMuted: false,
            playSound(type) {
                if (this.isMuted) return;
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode); gainNode.connect(audioCtx.destination);

                if (type === 'order') {
                    // 🛎️ جرس المطبخ التقليدي النقي للطلبات
                    oscillator.type = 'sine';
                    oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.4, audioCtx.currentTime);
                    oscillator.start(); oscillator.stop(audioCtx.currentTime + 0.3);
                } else if (type === 'waiter') {
                    // 🙋‍♂️ نغمة جرس رنين حادة ومختلفة مخصصة لاستدعاء النادل
                    oscillator.type = 'triangle';
                    oscillator.frequency.setValueAtTime(620, audioCtx.currentTime);
                    gainNode.gain.setValueAtTime(0.5, audioCtx.currentTime);
                    oscillator.start();
                    setTimeout(() => oscillator.frequency.setValueAtTime(780, audioCtx.currentTime), 140);
                    oscillator.stop(audioCtx.currentTime + 0.4);
                }
            },
            toggleMute(buttonId) {
                this.isMuted = !this.isMuted;
                const btn = document.getElementById(buttonId);
                if (btn) {
                    btn.innerText = this.isMuted ? "🔇 تشغيل الصوت المساعد" : "🔊 كتم الصوت المساعد";
                    btn.style.background = this.isMuted ? "#ef4444" : "#22c55e";
                }
            }
        };

        // 📥 الاستماع الحي والفوري لكافة تحديثات قاعدة البيانات لربط الشاشات حياً وتفعيل التنبيهات الصوتية
        function startLiveListening() {
            // أ: طلبات الوجبات
            db.collection("orders").orderBy("order_time", "desc").onSnapshot(snapshot => {
                const container = document.getElementById("orders-container");
                container.innerHTML = "";
                
                let incoming = false;
                snapshot.docChanges().forEach(change => { if (change.type === "added") incoming = true; });
                if (incoming && snapshot.docs.length > 0) AudioSystem.playSound('order');

                snapshot.forEach(doc => {
                    const data = doc.data();
                    let itemsHtml = data.items.map(i => `<li><strong>${i.name}</strong> (x${i.qty || 1})</li>`).join('');
                    container.innerHTML += `
                        <div class="card">
                            <div class="card-title">طاولة رقم: (${data.table_number}) <span style="font-size:13px; background:#b8952e; color:#000; padding:2px 8px; border-radius:4px;">جديد</span></div>
                            <ul>${itemsHtml}</ul>
                            <button class="btn-action btn-done" onclick="completeOrder('${doc.id}')">✔ تم التجهيز والمسح</button>
                        </div>`;
                });
            });

            // ب: نداءات استدعاء النادل
            db.collection("waiter_calls").where("status", "==", "active").onSnapshot(snapshot => {
                const container = document.getElementById("waiter-container");
                container.innerHTML = "";
                
                let callIncoming = false;
                snapshot.docChanges().forEach(change => { if (change.type === "added") callIncoming = true; });
                if (callIncoming && snapshot.docs.length > 0) AudioSystem.playSound('waiter');

                snapshot.forEach(doc => {
                    const data = doc.data();
                    container.innerHTML += `
                        <div class="card waiter-card">
                            <div class="card-title">🙋‍♂️ نداء النادل للـ طاولة: (${data.table_number})</div>
                            <button class="btn-action btn-done" onclick="archiveWaiterCall('${doc.id}')">✔ تم تلبية الطاولة</button>
                        </div>`;
                });
            });

            // جـ: تحميل قائمة الأطباق داخل لوحة التحكم لإدارتها
            db.collection("products_status").onSnapshot(snapshot => {
                const container = document.getElementById("admin-menu-list");
                container.innerHTML = "";
                snapshot.forEach(doc => {
                    const item = doc.data();
                    const available = item.available !== false;
                    const btnText = available ? "🟢 متوفر للطلب" : "🔴 غير متوفر/نفذ";
                    const btnClass = available ? "status-on" : "status-off";
                    container.innerHTML += `
                        <div class="menu-item-row">
                            <div class="menu-item-info">
                                <img src="${item.imageUrl || ''}" class="menu-item-img" alt="">
                                <div>
                                    <strong>${item.name}</strong>
                                    <div style="font-size:12px; color:#aaa;">${item.price} د.ع</div>
                                </div>
                            </div>
                            <div>
                                <button class="toggle-switch ${btnClass}" onclick="toggleAvailability('${doc.id}', ${available})">${btnText}</button>
                                <button class="btn-action btn-del" style="margin:0 6px 0 0; padding: 6px 12px; margin-top:0;" onclick="deleteProductComplete('${doc.id}')">🗑</button>
                            </div>
                        </div>`;
                });
            });
        }

        // 🛠️ المحركات والأوامر التنفيذية للوحة الإدارة والمطبخ
        function completeOrder(id) { db.collection("orders").doc(id).delete(); }
        function archiveWaiterCall(id) { db.collection("waiter_calls").doc(id).update({ status: "done" }); }
        function toggleAvailability(id, currentStatus) { db.collection("products_status").doc(id).set({ available: !currentStatus }, { merge: true }); }

        // دالة الرفع السحابي النظيف للصور والبيانات سوياً
        function addNewProductWithImage() {
            const name = document.getElementById("prod-name").value.trim();
            const price = document.getElementById("prod-price").value;
            const cat = document.getElementById("prod-category").value;
            const imageFile = document.getElementById("prod-image").files[0];
            const submitBtn = document.getElementById("btn-submit-prod");

            if (!name || !price) return alert("يرجى ملء الاسم والسعر أولاً!");
            if (!imageFile) return alert("يرجى اختيار صورة للطبق الجديد من جهازك!");

            submitBtn.disabled = true;
            submitBtn.innerText = "جاري رفع البيانات والصورة للسيرفر... ⏳";
            
            const id = name.toLowerCase().replace(/ /g, "_") + "_" + Date.now();
            const path = `products_images/${id}_${imageFile.name}`;
            const storageRef = storage.ref(path);

            storageRef.put(imageFile).then(snapshot => snapshot.ref.getDownloadURL())
            .then(downloadURL => {
                return db.collection("products_status").doc(id).set({
                    name: name, price: price, category: cat, available: true, imageUrl: downloadURL, imagePath: path
                });
            })
            .then(() => {
                document.getElementById("prod-name").value = "";
                document.getElementById("prod-price").value = "";
                document.getElementById("prod-image").value = "";
                submitBtn.disabled = false; submitBtn.innerText = "حفظ وإضافة للمنيو السحابي";
                alert("🎉 تم حفظ ورفع الطبق الجديد وصورته بنجاح للزبائن!");
            })
            .catch(err => {
                console.error(err);
                submitBtn.disabled = false; submitBtn.innerText = "حفظ وإضافة للمنيو السحابي";
                alert("فشل الرفع، يرجى مراجعة قواعد الـ Storage بالأمان في فايربيس!");
            });
        }

        // دالة الحذف النظيف لحذف المستند مع صورته السحابية من الخادم نهائياً لمنع امتلاء السيرفر
        function deleteProductComplete(id) {
            if (!confirm("هل أنت متأكد من مسح هذا الطبق مع صورته نهائياً؟")) return;
            db.collection("products_status").doc(id).get().then(doc => {
                if (doc.exists && doc.data().imagePath) {
                    return storage.ref(doc.data().imagePath).delete().then(() => db.collection("products_status").doc(id).delete());
                } else {
                    return db.collection("products_status").doc(id).delete();
                }
            })
            .then(() => alert("🗑️ تم حذف المنتج بالكامل واختفى من قوائم الطعام."))
            .catch(err => console.error("خطأ بالحذف:", err));
        }

        window.addEventListener('DOMContentLoaded', startLiveListening);
    </script>
</body>
</html>
