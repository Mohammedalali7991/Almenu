<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إدارة المنيو - مطعم دجلة</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;500;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #e67e22;
            --dark-color: #2c3e50;
            --bg-color: #f4f6f7;
        }
        
        body { 
            font-family: 'Cairo', sans-serif; 
            background-color: var(--bg-color);
            color: var(--dark-color);
        }

        .admin-card {
            background: #fff;
            border: none;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        .section-title {
            font-weight: 700;
            border-bottom: 2px solid var(--primary-color);
            padding-bottom: 5px;
            display: inline-block;
            margin-bottom: 15px;
        }

        .table-responsive {
            border-radius: 12px;
            overflow: hidden;
            background: white;
        }

        .btn-custom-primary {
            background-color: var(--primary-color);
            border-color: var(--primary-color);
            color: white;
        }

        .btn-custom-primary:hover {
            background-color: #d35400;
            border-color: #d35400;
            color: white;
        }
    </style>
</head>
<body class="bg-light" data-page="admin">

<div class="container py-4">
    <div class="card admin-card p-4">
        <h2 class="fw-bold mb-4 text-center text-md-start">⚙️ لوحة تحكم مدير المطعم</h2>
        
        <div class="mb-4 border-bottom pb-4">
            <h5 class="section-title text-success">إدارة التصنيفات</h5>
            <div class="row g-2">
                <div class="col-8 col-md-10">
                    <input type="text" id="newCat" class="form-control" placeholder="اسم التصنيف الجديد (مثال: مشويات)">
                </div>
                <div class="col-4 col-md-2">
                    <button onclick="addCategory()" class="btn btn-success w-100">إضافة</button>
                </div>
            </div>
        </div>

        <div class="mb-5">
            <h5 class="section-title text-primary">إضافة صنف جديد للمنيو</h5>
            <div class="row g-3">
                <div class="col-12 col-md-4">
                    <label class="form-label fw-bold small">اسم الصنف</label>
                    <input type="text" id="itemName" class="form-control" placeholder="مثال: كباب لحم">
                </div>
                <div class="col-12 col-sm-6 col-md-4">
                    <label class="form-label fw-bold small">القسم</label>
                    <select id="itemCat" class="form-select"></select>
                </div>
                <div class="col-12 col-sm-6 col-md-2">
                    <label class="form-label fw-bold small">السعر (د.ع)</label>
                    <input type="number" id="itemPrice" class="form-control" placeholder="السعر">
                </div>
                <div class="col-12 col-md-2 d-flex align-items-end">
                    <button onclick="addItem()" class="btn btn-custom-primary w-100 py-2 fw-bold">حفظ الصنف</button>
                </div>
            </div>
        </div>
        
        <div class="mb-4">
            <h5 class="section-title text-danger">الأصناف المضافة حالياً</h5>
            <div class="table-responsive shadow-sm mt-2">
                <table class="table table-hover align-middle mb-0 text-center">
                    <thead class="table-dark">
                        <tr>
                            <th>اسم الصنف</th>
                            <th>القسم</th>
                            <th>السعر</th>
                            <th>إجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="admin-table-items">
                        </tbody>
                </table>
            </div>
        </div>
        
        <div class="mt-4 d-flex justify-content-between">
            <a href="index.html" class="btn btn-outline-secondary px-4">📋 العودة للمنيو الرئيسي</a>
        </div>
    </div>
</div>

<script src="script.js"></script>

<script>
    // تعديل بسيط لضمان تشغيل عرض الجدول فوراً إذا كنا داخل صفحة الـ admin
    if (typeof render === 'function') {
        // إعادة توجيه دالة العرض لتغطي جدول الإدارة أيضاً
        const originalRenderItems = renderItems;
        renderItems = function(list) {
            originalRenderItems(list); // تشغيل العرض الأصلي لكروت المنيو في حال استدعائه
            
            const tableBody = document.getElementById('admin-table-items');
            if (tableBody) {
                if (list.length === 0) {
                    tableBody.innerHTML = `<tr><td colspan="4" class="text-muted py-3">لا توجد أصناف مضافة حالياً.</td></tr>`;
                    return;
                }
                tableBody.innerHTML = list.map((item, index) => `
                    <tr>
                        <td class="fw-bold">${item.name}</td>
                        <td><span class="badge bg-secondary px-2 py-1">${item.cat}</span></td>
                        <td class="text-primary fw-bold">${Number(item.price).toLocaleString()} د.ع</td>
                        <td>
                            <button class="btn btn-sm btn-danger px-3" onclick="deleteItem(${index})">🗑️ حذف</button>
                        </td>
                    </tr>
                `).join('');
            }
        };
        // تحديث البيانات عند التحميل
        render();
    }
</script>
</body>
</html>
